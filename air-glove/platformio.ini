; Air Glove — PlatformIO configuration
;
; Two environments:
;   esp32dev  → firmware build for the target hardware (Arduino framework)
;   native    → host build for pure srv_* unit tests (no Arduino/ESP-IDF)
;
; Layering is enforced at build time: `env:native` excludes every `dd_*`
; and `app_*` lib (they use Arduino/ESP-IDF/FreeRTOS). Any `srv_*` lib
; that accidentally includes Arduino.h will break the native build.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
    -DAG_ENV_ESP32
; NimBLE-Arduino is added in plan 04 via lib/dd_ble_hid/library.json
; lib_deps =

[env:native]
platform = native
build_src_filter =
    +<*>
    -<../lib/dd_mpu6050/>
    -<../lib/dd_touch/>
    -<../lib/dd_ble_hid/>
    -<../lib/app_controller/>
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DAG_ENV_NATIVE
test_framework = unity
