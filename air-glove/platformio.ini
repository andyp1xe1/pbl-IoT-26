; Air Glove — PlatformIO configuration
;
; Two environments:
;   esp32dev  → firmware build for the target hardware (Arduino framework).
;   native    → host build for pure srv_* unit tests (no Arduino/ESP-IDF).
;
; Layering enforcement:
;   - `env:native` `lib_ignore`s every dd_* and app_* library, so Arduino-
;     and NimBLE-dependent code never tries to link on the host.
;   - `env:native` `build_src_filter`s out `src/main.cpp` so the top-level
;     bootstrapper (which calls FreeRTOS-backed `app_controller_start`) is
;     not compiled on the host either.
;   - Any `srv_*` lib that accidentally includes Arduino.h will break the
;     native build the moment it is touched in a host unit test.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
    -DAG_ENV_ESP32
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.0

[env:native]
platform = native
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DAG_ENV_NATIVE
build_src_filter =
    +<*>
    -<main.cpp>
test_framework = unity
; Hardware libs use Arduino / ESP-IDF / NimBLE and must not compile on host.
lib_ignore =
    dd_mpu6050
    dd_touch
    dd_ble_hid
    app_controller
; Host env only runs service unit tests (srv_*). Driver / app-controller
; test suites pull in Arduino / FreeRTOS / NimBLE and must stay off host.
test_filter = test_srv_*
